project_name: "agent_company"
default_status: "To Do"
statuses:
  [
    "To Do",
    "Plan",
    "Review",
    "Test",
    "Implement",
    "QA",
    "Deploy",
    "Blocked",
    "In Progress",
    "Done",
  ]
labels: []
definition_of_done:
  [
    "Acceptance criteria on testattu tehtävän scopea vasten",
    "Relevantit lint typecheck build ja testikomennot on ajettu tai rajaus on kirjattu",
    "Salaisuuksia tokeneita credentialeja ja PII-tietoja ei palauteta lokiteta tai commitoida",
    "Julkiset API data infra ja operointisopimukset on päivitetty tarvittaessa",
    "Final Summary kuvaa toteutuksen tuloksen validoinnin ja rajaukset",
  ]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "code --wait"
auto_open_browser: true
default_port: 64201
remote_operations: false
auto_commit: false
filesystem_only: false
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: false
active_branch_days: 30
task_prefix: "task"
